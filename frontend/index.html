<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShopFlow — Online Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#1a1a2e;--accent:#e94560;--gold:#f5a623;--light:#f8f9fa;--white:#fff;--muted:#6c757d;--border:#e0e0e0;--radius:10px;--shadow:0 4px 20px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:#333;min-height:100vh}
button{cursor:pointer;font-family:'DM Sans',sans-serif}

/* AUTH */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.auth-box{background:var(--white);border-radius:16px;padding:2rem;width:min(420px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.auth-box h2{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--primary);margin-bottom:1.25rem;text-align:center}
.auth-box input{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;margin-bottom:.75rem;outline:none;transition:border-color .2s}
.auth-box input:focus{border-color:var(--accent)}
.auth-box .err{color:#dc3545;font-size:.82rem;margin-bottom:.6rem;display:none}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:.75rem 1.5rem;border-radius:8px;font-size:.95rem;font-weight:500;cursor:pointer;width:100%;transition:background .2s}
.btn-primary:hover{background:#c73652}
.auth-switch{text-align:center;margin-top:.75rem;font-size:.85rem;color:var(--muted)}
.auth-switch a{color:var(--accent);cursor:pointer;text-decoration:underline}
.modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)}

/* NAV */
nav{background:var(--primary);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:500;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.brand{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--white);letter-spacing:.02em}
.brand span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.nb{background:none;border:none;color:#ccc;cursor:pointer;font-size:.9rem;padding:.4rem .85rem;border-radius:6px;transition:all .2s;font-family:'DM Sans',sans-serif}
.nb:hover,.nb.active{color:var(--white);background:rgba(255,255,255,.1)}
.cart-nb{background:rgba(233,69,96,.2);color:#f87171}
.cbadge{background:var(--accent);color:#fff;border-radius:50%;padding:.1rem .4rem;font-size:.72rem;margin-left:.2rem}
#user-pill button{background:var(--accent);color:#fff;border:none;padding:.38rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem}
.user-name{color:#93c5fd;font-size:.83rem;margin-right:.4rem}
.ham{display:none;background:none;border:none;color:#ccc;font-size:1.4rem;cursor:pointer}
.mob-nav{display:none;flex-direction:column;gap:.4rem;background:#16213e;padding:.75rem 2rem}
.mob-nav.open{display:flex}
@media(max-width:640px){.nav-right{display:none}.ham{display:block}}

/* HERO */
#hero-wrap{background:linear-gradient(135deg,var(--primary) 0%,#16213e 50%,#0f3460 100%);padding:4rem 2rem 3rem;text-align:center}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);color:var(--white);margin-bottom:.5rem}
.hero-title span{color:var(--accent)}
.hero-sub{color:#94a3b8;font-size:1rem;margin-bottom:2rem}
.cat-bar{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
.cat-btn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:#cbd5e1;padding:.45rem 1.1rem;border-radius:20px;cursor:pointer;font-size:.85rem;font-family:'DM Sans',sans-serif;transition:all .2s}
.cat-btn:hover,.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* PAGES */
.page{display:none}.page.active{display:block}

/* SHOP */
#page-shop{padding:2rem}
.shop-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
.shop-title{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--primary)}
.shop-controls{display:flex;gap:.6rem;flex-wrap:wrap}
.shop-controls input,.shop-controls select{border:1.5px solid var(--border);background:var(--white);border-radius:8px;padding:.5rem .85rem;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;color:#333}
.shop-controls input:focus{border-color:var(--accent)}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem}
.prod-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.13)}
.prod-img{position:relative;height:190px;background:#f0f0f0;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.prod-card:hover .prod-img img{transform:scale(1.05)}
.no-img{height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;background:#f8f8f8}
.cat-tag{position:absolute;top:.5rem;left:.5rem;background:rgba(26,26,46,.8);color:#fff;font-size:.68rem;padding:.2rem .55rem;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.stk-tag{position:absolute;bottom:.5rem;right:.5rem;font-size:.68rem;padding:.2rem .55rem;border-radius:4px}
.stk-tag.in{background:#d1fae5;color:#065f46}
.stk-tag.low{background:#fef3c7;color:#92400e}
.stk-tag.out{background:#fee2e2;color:#991b1b}
.prod-body{padding:.9rem}
.prod-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--primary);margin-bottom:.25rem}
.prod-desc{font-size:.78rem;color:var(--muted);line-height:1.4;margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-price{font-weight:600;color:var(--accent);font-size:1.05rem}
.prod-unit{font-size:.74rem;color:var(--muted);font-weight:400}
.prod-actions{display:flex;gap:.5rem;margin-top:.65rem}
.btn-add{flex:1;background:var(--primary);color:#fff;border:none;padding:.55rem;border-radius:7px;cursor:pointer;font-size:.82rem;transition:background .2s}
.btn-add:hover:not(:disabled){background:var(--accent)}
.btn-add:disabled{background:#ccc;cursor:not-allowed}
.btn-eye{background:#f0f0f0;border:none;padding:.55rem .75rem;border-radius:7px;cursor:pointer;font-size:.9rem}
.btn-eye:hover{background:#e0e0e0}
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty .ei{font-size:3rem;margin-bottom:1rem}

/* CART */
#page-cart{padding:2rem}
.cart-grid{display:grid;grid-template-columns:1fr min(380px,100%);gap:1.5rem;align-items:start}
@media(max-width:768px){.cart-grid{grid-template-columns:1fr}}
.cart-item{background:var(--white);border-radius:var(--radius);padding:1rem;display:flex;gap:1rem;align-items:center;margin-bottom:.75rem;box-shadow:var(--shadow)}
.ci-img{width:68px;height:68px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:2rem}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1}
.ci-info h4{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--primary)}
.ci-cat{font-size:.73rem;color:var(--muted);margin:.15rem 0 .4rem}
.qty-row{display:flex;align-items:center;gap:.5rem}
.qbtn{background:#f0f0f0;border:none;width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:.9rem}
.qnum{font-weight:600;font-size:.9rem;min-width:20px;text-align:center}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.ci-price{font-weight:600;color:var(--accent)}
.btn-rm{background:none;border:none;cursor:pointer;font-size:1rem;opacity:.5;transition:opacity .2s}
.btn-rm:hover{opacity:1;color:#dc3545}
.o-summary{background:var(--white);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.o-summary h3{font-family:'Playfair Display',serif;color:var(--primary);font-size:1.2rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:.4rem}
.sum-row.tot{font-weight:700;font-size:1rem;color:var(--primary);padding-top:.5rem;border-top:1px solid var(--border);margin-top:.4rem}
.chk-form label{display:block;font-size:.8rem;color:var(--muted);margin:.6rem 0 .25rem}
.chk-form textarea,.chk-form select{width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;background:var(--white);resize:vertical}
.chk-form textarea:focus{border-color:var(--accent)}
.btn-place{width:100%;margin-top:1rem;background:var(--accent);color:#fff;border:none;padding:.85rem;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-place:hover:not(:disabled){background:#c73652}
.btn-place:disabled{background:#ccc;cursor:not-allowed}

/* ORDERS */
#page-orders{padding:2rem}
.orders-list{display:flex;flex-direction:column;gap:1rem;max-width:700px}
.ord-card{background:var(--white);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.ord-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
.ord-id{font-weight:700;color:var(--primary);font-family:'Playfair Display',serif}
.ord-date{font-size:.73rem;color:var(--muted);margin-top:.1rem}
.spill{padding:.22rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.spill.new{background:#dbeafe;color:#1e40af}
.spill.confirmed,.spill.delivered{background:#d1fae5;color:#065f46}
.spill.processing,.spill.ready{background:#fef3c7;color:#92400e}
.spill.cancelled{background:#fee2e2;color:#991b1b}
.ord-items{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.ord-chip{background:#f0f0f0;border-radius:4px;padding:.2rem .6rem;font-size:.73rem;color:#333}
.ord-foot{display:flex;justify-content:space-between;align-items:center}
.ord-total{font-weight:700;color:var(--accent)}

/* MODAL */
#success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:900;opacity:0;pointer-events:none;transition:opacity .25s;padding:1rem}
#success-overlay.open{opacity:1;pointer-events:all}
#success-box{background:var(--white);border-radius:16px;padding:2rem;width:min(500px,92vw);max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.btn-outline{background:none;border:1.5px solid var(--accent);color:var(--accent);padding:.6rem 1.2rem;border-radius:8px;cursor:pointer;font-size:.88rem;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:hover{background:var(--accent);color:#fff}
.o-box{background:#f8f8f8;border-radius:8px;padding:1rem;font-size:.83rem;line-height:1.7}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#fff;padding:.75rem 1.5rem;border-radius:8px;display:flex;align-items:center;gap:.6rem;font-size:.88rem;z-index:2000;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* PAGE TITLE */
.page-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--primary);margin-bottom:1.25rem}
.page-title span{color:var(--accent)}

/* FOOTER */
footer{background:var(--primary);color:#94a3b8;text-align:center;padding:2rem 1rem;margin-top:3rem}
footer p{font-size:.83rem;line-height:1.8}
footer strong{color:var(--white)}
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div class="overlay" id="auth-overlay">
  <div class="auth-box" style="position:relative">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div id="form-login">
      <h2>Welcome Back</h2>
      <div class="err" id="li-err"></div>
      <input type="text" id="li-email" placeholder="Phone number or Email"/>
      <input type="password" id="li-pass" placeholder="Password"/>
      <button class="btn-primary" id="li-btn" onclick="doLogin()">Login</button>
      <div class="auth-switch">No account? <a onclick="switchAuth('register')">Sign up</a></div>
    </div>
    <div id="form-register" style="display:none">
      <h2>Create Account</h2>
      <div class="err" id="rg-err"></div>
      <input type="text" id="rg-name" placeholder="Full Name *"/>
      <input type="tel" id="rg-phone" placeholder="Phone Number *"/>
      <input type="email" id="rg-email" placeholder="Email (optional)"/>
      <input type="password" id="rg-pass" placeholder="Password (min 6 chars) *"/>
      <textarea id="rg-addr" placeholder="Delivery Address (optional)" rows="2" style="width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;margin-bottom:.75rem;background:var(--white);outline:none;resize:vertical"></textarea>
      <button class="btn-primary" id="rg-btn" onclick="doRegister()">Create Account</button>
      <div class="auth-switch">Have an account? <a onclick="switchAuth('login')">Login</a></div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="brand">Shop<span>Flow</span></div>
  <div class="nav-right">
    <button class="nb active" data-page="shop">🛍 Shop</button>
    <button class="nb" data-page="orders">📦 Orders</button>
    <button class="nb cart-nb" data-page="cart">🛒 Cart <span class="cbadge" id="cbadge">0</span></button>
    <div id="user-pill"></div>
  </div>
  <button class="ham" id="ham">☰</button>
</nav>
<div class="mob-nav" id="mob-nav">
  <button class="nb" data-page="shop">🛍 Shop</button>
  <button class="nb" data-page="orders">📦 Orders</button>
  <button class="nb" data-page="cart">🛒 Cart (<span id="cbadge-m">0</span>)</button>
</div>

<!-- HERO -->
<div id="hero-wrap">
  <div class="hero-title">Discover & Shop <span>Everything</span></div>
  <div class="hero-sub">Quality products delivered to your doorstep</div>
  <div class="cat-bar" id="cat-bar">
    <button class="cat-btn active" onclick="filterCat('')">All</button>
  </div>
</div>

<!-- PAGES -->
<div class="page active" id="page-shop">
  <div style="padding:2rem">
    <div class="shop-header">
      <div class="shop-title">Our Products</div>
      <div class="shop-controls">
        <input type="text" id="srch" placeholder="🔍 Search..." oninput="loadProducts()" style="width:180px"/>
        <select id="cat-sel" onchange="loadProducts()"><option value="">All Categories</option></select>
        <select id="sort-sel" onchange="loadProducts()">
          <option value="">Sort By</option>
          <option value="asc">Price: Low to High</option>
          <option value="desc">Price: High to Low</option>
        </select>
      </div>
    </div>
    <div class="prod-grid" id="prod-grid">
      <div class="empty" style="grid-column:1/-1"><div class="ei">⏳</div><h3>Loading...</h3></div>
    </div>
  </div>
</div>

<div class="page" id="page-cart">
  <div style="padding:2rem">
    <div class="page-title">Your <span>Cart</span></div>
    <div id="cart-wrap"></div>
  </div>
</div>

<div class="page" id="page-orders">
  <div style="padding:2rem">
    <div class="page-title">My <span>Orders</span></div>
    <div id="orders-wrap"></div>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div id="success-overlay">
  <div id="success-box" style="position:relative"></div>
</div>

<!-- TOAST -->
<div id="toast"><span id="toast-icon">✓</span><span id="toast-msg">Done</span></div>

<footer>
  <p><strong>ShopFlow</strong></p>
  <p>Quality products · Fast delivery · Easy returns</p>
</footer>

<script src="js/main.js?v=1"></script>
</body>
</html>
